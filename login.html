<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVANET - High Speed WiFi</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="inline.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .pkg-container { margin-top: 20px; display: grid; gap: 12px; }
        .pkg-btn { 
            background: #09a5db; color: white; border: none; padding: 18px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s;
        }
        .pkg-btn:active { transform: scale(0.96); opacity: 0.9; }
        .pkg-btn.test { background: #6c757d; margin-top: 10px; }
        .price-tag { display: block; font-size: 13px; font-weight: normal; opacity: 0.8; }
        .status-msg { margin: 15px 0; font-weight: bold; font-size: 14px; min-height: 20px; color: #555; }
        .footer-info { font-size: 11px; color: #aaa; margin-top: 25px; line-height: 1.5; }
    </style>
</head>

        /** 3. AUTO-RETRY LOGIC **/
        let retryCount = 0;
        const maxRetries = 15;

        function setStatus(text, color = "#555") {
            const el = document.getElementById('status-box');
            el.innerText = text;
            el.style.color = color;
        }

        function triggerPoolLogin(profile) {
            setStatus("Connecting... (Attempt " + (retryCount + 1) + ")", "#09a5db");
            
            const pool = pools[profile];
            const acc = pool[Math.floor(Math.random() * pool.length)];
            
            document.sendin.username.value = acc.u;
            document.sendin.password.value = hexMD5('$(chap-id)' + acc.p + '$(chap-challenge)');
            
            const formData = new URLSearchParams(new FormData(document.sendin));

            fetch('$(link-login-only)', { method: 'POST', body: formData })
            .then(res => {
                if (res.url.includes('error')) {
                    if (retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(() => triggerPoolLogin(profile), 400);
                    } else {
                        setStatus("Server busy. Try again.", "red");
                    }
                } else {
                    setStatus("Connected! Enjoy.", "green");
                    window.location.href = "$(link-status)";
                }
            }).catch(() => document.sendin.submit());
        }

        /** 4. PAYSTACK & TRIAL **/
        function pay(profile, ksh) {
            let handler = PaystackPop.setup({
                key: '#----ENTER PAYSTACK PUBLIC KEY HERE----', 
                email: 'user@novanet.com',
                amount: ksh * 100,
                currency: 'KES',
                callback: (res) => { if (res.status === 'success') { retryCount = 0; triggerPoolLogin(profile); } }
            });
            handler.openIframe();
        }

        function startTest() {
            if (localStorage.getItem('test_used')) return setStatus("Trial already used.", "red");
            localStorage.setItem('test_used', 'true');
            retryCount = 0;
            triggerPoolLogin('test');
        }
    </script>
    $(endif)

    <div class="main-card">
        <h1 style="color:#09a5db; margin:0;">NOVANET</h1>
        <p style="color:#777; margin-bottom:20px;">Fast & Secure Unlimited WiFi</p>
        
        <div id="status-box" class="status-msg">Choose a data plan to start</div>

        <div class="pkg-container">
            <button class="pkg-btn" onclick="pay('5hr', 10)">
                5 HOURS ACCESS <span class="price-tag">Ksh 10</span>
            </button>
            <button class="pkg-btn" onclick="pay('12hr', 20)">
                12 HOURS ACCESS <span class="price-tag">Ksh 20</span>
            </button>
            <button class="pkg-btn" onclick="pay('1day', 35)">
                24 HOURS ACCESS <span class="price-tag">Ksh 35</span>
            </button>
            <button class="pkg-btn test" onclick="startTest()">
                5 MIN FREE TRIAL
            </button>
        </div>

        <div class="footer-info">
            IP: $(ip) | MAC: $(mac)<br>
            © 2026 NOVANET NETWORKS
        </div>
    </div>
